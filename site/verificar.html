<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Verificar meu cadastro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/img/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon-32.png" />
  <link rel="apple-touch-icon" href="./assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/dotWave.js"></script>
</head>
<body>
  <div class="container">
    <a class="back" href="./index.html">
      <svg class="ic ic-sm" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg> Voltar
    </a>
    <h2>Verificar meu cadastro</h2>
    <p class="muted center">Informe seu CPF e sua data de nascimento para ver os dados que você cadastrou.</p>

    <div id="busca">
      <label>CPF:
        <input type="text" id="cpf" maxlength="14" inputmode="numeric" placeholder="000.000.000-00" />
      </label>
      <label>Data de Nascimento:
        <input type="date" id="nascimento" />
      </label>
      <button id="btnBuscar" class="btn-lg">Buscar meu cadastro</button>
    </div>

    <div id="resultado" class="hidden fade-in">
      <div class="card" id="cardCadastro"></div>
      <p class="muted mt">Precisa corrigir alguma informação? Clique abaixo para solicitar a mudança ao pároco.
        A administração fará a alteração para você.</p>
      <a id="btnMudanca" class="btn-block btn-wa" target="_blank" rel="noopener">
        <svg class="ic-wa" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.29.173-1.414-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
        Solicitar mudança pelo WhatsApp
      </a>
      <button class="btn-ghost" id="btnNovaBusca">Fazer nova busca</button>
    </div>
  </div>

  <script type="module">
    import { db, COL_CADASTROS } from './assets/js/firebase.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { aplicarMascaraCPF, onlyDigits, cpfValido, formatarCPF, dataBR, toast, linkWhatsApp, comCarregamento } from './assets/js/utils.js';

    const cpfEl = document.getElementById('cpf');
    const nascEl = document.getElementById('nascimento');
    aplicarMascaraCPF(cpfEl);

    const btnBuscar = document.getElementById('btnBuscar');
    btnBuscar.addEventListener('click', () => comCarregamento(btnBuscar, buscar));
    cpfEl.addEventListener('keydown', e => { if (e.key === 'Enter') comCarregamento(btnBuscar, buscar); });
    document.getElementById('btnNovaBusca').addEventListener('click', () => {
      document.getElementById('resultado').classList.add('hidden');
      document.getElementById('busca').classList.remove('hidden');
      cpfEl.value = ''; nascEl.value = '';
    });

    async function buscar(){
      const cpf = onlyDigits(cpfEl.value);
      if (!cpfValido(cpf)){ toast('CPF inválido.', 'erro'); return; }
      if (!nascEl.value){ toast('Informe a data de nascimento.', 'warn'); return; }
      try {
        const snap = await getDoc(doc(db, COL_CADASTROS, cpf));
        if (!snap.exists()){ toast('Nenhum cadastro encontrado para este CPF.', 'warn'); return; }
        const d = snap.data();
        if (d.nascimento !== nascEl.value){ toast('CPF e data de nascimento não conferem.', 'erro'); return; }
        mostrar(d);
      } catch (e){
        console.error(e);
        toast('Erro ao buscar. Tente novamente.', 'erro');
      }
    }

    function mostrar(d){
      const pastorais = (d.pastorais || []).map(p => `${p.nome} (${p.funcao})`).join(', ') || '—';
      document.getElementById('cardCadastro').innerHTML = `
        <h4>${d.nome}</h4>
        <p><strong>CPF:</strong> ${formatarCPF(d.cpf)}</p>
        <p><strong>Celular:</strong> ${d.celular || '—'}</p>
        <p><strong>Data de Nascimento:</strong> ${dataBR(d.nascimento)}</p>
        <p><strong>Comunidade:</strong> ${d.comunidade}</p>
        <p><strong>Função na Comunidade:</strong> ${d.funcaoComunidade || '—'}</p>
        <p><strong>Pastorais / Grupos:</strong> ${pastorais}</p>`;

      const msg = `Olá! Quero mudar informações do meu cadastro de agente de pastoral.\n\n`
        + `Nome: ${d.nome}\nCPF: ${formatarCPF(d.cpf)}\nComunidade: ${d.comunidade}\n\n`
        + `O que preciso mudar:\n- `;
      document.getElementById('btnMudanca').href = linkWhatsApp(msg);

      document.getElementById('busca').classList.add('hidden');
      const res = document.getElementById('resultado');
      res.classList.remove('hidden'); res.classList.add('fade-in');
    }
  </script>
</body>
</html>
